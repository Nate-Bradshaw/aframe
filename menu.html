<!DOCTYPE html>
<!--
aframe-watcher index.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- <link rel="stylesheet" href="./style.css">  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- <script src="script.js"></script>
    <script src="components\log.js"></script> -->
    <script src="menu.js"></script>
    <title>Vr project</title>
  </head>
  <body>
    <a-scene>
      <a-sky color="#ECECEC" material="color: #4d4d4d" id="sky"></a-sky>
      <!-- Camera and cursor (gaze/click) -->
      <a-camera id="MainCam">
        <a-entity
          id="RingOver"
          cursor="fuse: true; fuse-timeout = 1000"
          raycaster="objects: .clickable"
          position="0 0 -1"
          
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03;"
          material="color: green; shader: flat"
            
          animation__fusing="property: geometry.thetaLength; from: 360; to: 0; dur: 1500; startEvents: fusing; easing: linear"
          animation__reset="property: geometry.thetaLength; to: 360; dur: 50; startEvents: mouseleave">

          <!-- Outer ring -->
          <a-entity
            id="RingUnder" 
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: white; shader: flat"
            position="0 0 -0.0001">  
          </a-entity>

        </a-entity>
      </a-camera>

      <!-- Ground + light so you can see -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#DDD"></a-plane>
      <a-light type="ambient" intensity="0.9"></a-light>

      <!-- Labels -->
      <a-text
        id="playGameText"
        value="Play Game"
        position="1.5 2.2 -3"
        align="center"
        width="6"
        color="#111"
      ></a-text>
      
      <a-text 
      id="menuText"
      value="Menu" 
      position="0.00369 2.699 -1.95343" 
      align="center" 
      width="6" 
      color="#111"
      visible="false"
      ></a-text>

      <a-text 
      id="statusText-2" 
      value="How To Play" 
      position="-1.5 2.2 -3" 
      align="center" 
      width="6" 
      color="#111" 
      value: How To Play;
      ></a-text>

      <!-- Buttons -->
      <a-box
        id="switch-button"
        class="clickable"
        position="1.5 1.5 -3"
        depth="0"
        height="0.6"
        width="1.2"
        color="#3B82F6"

        animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
        animation__mouseleave="property: material.color; to: #3B82F6; dur: 100; startEvents: mouseleave">
      </a-box>
      <a-entity 
      id="exit-button"
      material="color:#FFC0CB" 
      geometry="depth: 0; height: 0.1; width: 0.1"
      position="1.27971 2.31821 -1.993" 
      class="not-clickable" 
      scale="3 3 1"
      visible="false"
      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #FFC0CB; dur: 100; startEvents: mouseleave">
      ></a-entity>

      <a-entity
      id="instruction-btn" 
      position="-1.5 1.5 -3" 
      geometry="box"
      material="color: #FF0000" 
      scale="1 0.6 0.1"
      class="clickable"
      
      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #FF0000; dur: 100; startEvents: mouseleave">></a-entity>
      ></a-box>

      <a-box
        id="example-menu"
        position="0 1.5 -2"
        height="2"
        width="3"
        depth="0"
        color="#808080"
        visible="false"  
      ></a-box>
    </a-scene>

  </body>
</html>
