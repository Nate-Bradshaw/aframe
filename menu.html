<!DOCTYPE html>
<!--
aframe-watcher index.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- <link rel="stylesheet" href="./style.css">  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="mainMenu.js"></script>
    <title>Vr project</title>
  </head>
  <body>
    <a-scene>
      <a-sky color="#ECECEC" material="color: #17132f" id="sky"></a-sky>
      <!-- Camera and cursor (gaze/click) -->
      <a-camera id="MainCam">
        <a-entity
          id="RingOver"
          cursor="fuse: true; fuse-timeout = 1000"
          raycaster="objects: .clickable"
          position="0 0 -1"
          
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03;"
          material="color: green; shader: flat"
            
          animation__fusing="property: geometry.thetaLength; from: 360; to: 0; dur: 1500; startEvents: fusing; easing: linear"
          animation__reset="property: geometry.thetaLength; to: 360; dur: 50; startEvents: mouseleave">

          <!-- Outer ring -->
          <a-entity
            id="RingUnder" 
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: white; shader: flat"
            position="0 0 -0.0001">  
          </a-entity>

        </a-entity>
      </a-camera>

      <!-- Ground + light so you can see -->
      <a-entity id="Floor" position="0 0 0" geometry="primitive: circle; radius: 2.5"  rotation="-90 0 0" material="color: #b6a3cd; flatShading: false; roughness: 0.5"></a-entity> geometry="primitive: circle; radius: 2.5"></a-entity>
      <a-entity id="Floor-2" geometry="primitive: circle; radius: 3" rotation="-90 0 0" material="color: #74549a" position="0 -0.12743 0"></a-entity>

      <a-light type="ambient" intensity="0.9"></a-light>

      <!-- Labels -->
      <a-text
      id="playGameText"
      value="Play Game"
      position="1.5 2.2 -3"
      align="center"
      width="6"
      color="#111"
      ></a-text>
      
      <a-text 
      id="menuText"
      value="Menu" 
      position="0.00369 2.699 -1.95343" 
      align="center" 
      width="6" 
      color="#111"
      visible="false"
      ></a-text>

      <a-text 
      id="statusText-2" 
      value="How To Play" 
      position="-1.5 2.2 -3" 
      align="center" 
      width="6" 
      color="#111" 
      value: How To Play;
      
      ></a-text>

      <a-text id="easyTxt" 
      position="-0.0313 2.27475 -1.9677" 
      align="center" 
      width="6" 
      color="#111" 
      text="value: Easy"
      visible="false">
      </a-text>

      <a-text id="normalTxt" 
      position="-0.0313 1.86995 -1.9677" 
      align="center" 
      width="6" 
      color="#111" 
      text="value: Normal"
      visible="false">
      </a-text>

      <a-text id="hardTxt" 
      position="-0.0313 1.45836 -1.9677" 
      align="center" 
      width="6" 
      color="#111" 
      text="value: Hard"
      visible="false">
      </a-text>

      <a-text id="exitTxt" 
      position="-0.0313 0.81992 -1.9677" 
      align="center" 
      width="6" 
      color="#111" 
      text="value: Exit"
      visible="false">
      </a-text>

      <!-- Buttons -->
      <a-box
      id="switch-button"
      class="clickable"
      position="1.5 1.5 -3"
      depth="0"
      height="0.6"
      width="1.2"
      color="#3B82F6"

      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #3B82F6; dur: 100; startEvents: mouseleave">
      </a-box>

      <a-entity 
      id="exit-button"
      material="color:#FFC0CB" 
      geometry="depth: 0; height: 0.350; width: 1"
      position="-0.024 0.802 -1.993" 
      class="not-clickable" 
      visible="false"
      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #FFC0CB; dur: 100; startEvents: mouseleave">
      ></a-entity>

      <a-entity
      id="instruction-btn" 
      position="-1.5 1.5 -3" 
      geometry="box"
      material="color: #FF0000" 
      scale="1 0.6 0.1"
      class="clickable"
      
      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #FF0000; dur: 100; startEvents: mouseleave">></a-entity>
      ></a-box>

      <!-- Menu Contents -->
      <a-box
      id="example-menu"
      position="0 1.5 -2"
      height="2"
      width="3"
      depth="0"
      color="#808080"
      visible="false"  
      ></a-box>

      <!-- How To Play Menu -->
      <a-text id="gameInstructions"
      value="Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
      position="-1.44642 1.91139 -1.99643"
      align="center" 
      color="#111" 
      scale="0.4 0.5 1" 
      text="align: left; 
      width: 4.8"
      visible="false">
      </a-text>
      <a-image 
      id="menuImage"
      src="images/Kevin_Macleod.jpg"
      position="0.979 1.979 -1.989"
      visible="false"
      ></a-image>

      <!-- Difficulty Menu -->
      <a-entity id="easy" 
      material="color: #d2ffc2" 
      geometry="depth: 0; 
      height: 0.35" 
      position="-0.02541 2.26746 -1.993" 
      class="not-clickable"
      visible="false" 
      animation__mouseenter="dur: 100; property: material.color; startEvents: mouseenter; to: #89B4F9" 
      animation__mouseleave="dur: 100; property: material.color; startEvents: mouseleave; to: #d2ffc2">
      &gt;</a-entity>

      <a-entity id="normal" 
      material="color: #ffbf75" 
      geometry="depth: 0; 
      height: 0.35" 
      position="-0.02541 1.853 -1.993" 
      class="not-clickable"
      visible="false" 
      animation__mouseenter="dur: 100; property: material.color; startEvents: mouseenter; to: #89B4F9" 
      animation__mouseleave="dur: 100; property: material.color; startEvents: mouseleave; to: #ffbf75">
      &gt;</a-entity>

      <a-entity id="hard" 
      material="color: #ff294d" 
      geometry="depth: 0; 
      height: 0.35" 
      position="-0.02541 1.430 -1.993" 
      class="not-clickable"
      visible="false" 
      animation__mouseenter="dur: 100; property: material.color; startEvents: mouseenter; to: #89B4F9" 
      animation__mouseleave="dur: 100; property: material.color; startEvents: mouseleave; to: #ff294d">
      &gt;</a-entity>

      <!-- Button to reset roration to forward facing -->
      <a-sphere 
      id = "reset-btn"
      position="0 -0.75 0" 
      radius="1" 
      color="#EF2D5E"
      class="clickable"

      animation__mouseenter="property: material.color; to: #F5819E; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #EF2D5E; dur: 100; startEvents: mouseleave">
    </a-sphere>
    <a-entity geometry="primitive: plane" material="color: #ff0000" id="forward_arrow" rotation="-90 0 0" position="0 0.00471 -0.49146" scale="0.06 1 1"></a-entity>

        <a-entity geometry="" position="1.99629 1.29825 -2.56473" rotation="0 -38 -90" scale="1.05 0.15 0.8" id="side-2" material="color: #eb81d9"></a-entity>
        <a-entity geometry="primitive: sphere" position="2.6272 1.82012 -2.04009" scale="0.2 0.14 0.14" rotation="0 -38 0" id="arial base" material="color: #a696d3"></a-entity>
        <a-entity position="2.66067 2.19819 -1.78015" geometry="" scale="0.03 0.8 0.03" rotation="32 0 0" material="color: #6e6e6e" id="arial"></a-entity>
        <a-entity position="2.66403 2.18068 -2.23552" geometry="" scale="0.03 0.8 0.03" rotation="40 180 14.999999999999998" material="color: #6e6e6e" id="arial-2"></a-entity>
      </a-entity>


      <a-entity id="speaker1" rotation="0 -50 0" position="3.15051 0.77859 -2.71649">
        <a-entity id="speakerBox" geometry="" position="0 0 0" rotation="0 0 0" scale="1 1.81 1" material="color: #0000d5"></a-entity>
        <a-entity id="tweeter" geometry="primitive: circle; radius: 0.2" position="0 0.51232 0.52675" rotation="0 0 0" scale="1 1 1">

        <a-entity id="speakerCircle" geometry="primitive: circle; radius: 0.35" position="0 -0.2621 0.53771" rotation="0 0 0" scale="1 1 1" material="color: #d28c5e">

        </a-entity>
