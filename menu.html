<!DOCTYPE html>
<!--
aframe-watcher index.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- <link rel="stylesheet" href="./style.css">  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- <script src="script.js"></script>
    <script src="components\log.js"></script> -->
    <script src="menu.js"></script>
    <title>Vr project</title>
  </head>
  <body>
    <a-scene>
      <!-- Camera and cursor (gaze/click) -->
      <a-entity id="cameraRig" position="0 0 0">
        <a-entity
          id="cam"
          camera
          position="0 1.6 0"
          look-controls
        >
          <!-- Cursor configured to target only .clickable objects -->
          <a-cursor
            raycaster="objects: .clickable; showLine: true; far: 20"
            fuse="false"
          ></a-cursor>
        </a-entity>
      </a-entity>

      <!-- Ground + light so you can see -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#DDD"></a-plane>
      <a-light type="ambient" intensity="0.9"></a-light>

      <!-- A label so you see output inside the scene -->
      <a-text
        id="statusText"
        value="Play Game"
        position="0 2.2 -3"
        align="center"
        width="6"
        color="#111"
      ></a-text>

      <!-- The interactive box -->
      <a-box
        id="switch-button"
        class="clickable"
        position="0 1.5 -3"
        depth="0"
        height="0.6"
        width="1.2"
        color="#3B82F6"
      ></a-box>

      <a-box
        id="example-menu"
        position="0 1.5 -2"
        height="2"
        width="3"
        depth="0"
        color="#808080"
        visible="false"
      ></a-box>

      <a-text 
      id="menuText"
      value="Menu" 
      position="0.00369 2.699 -1.95343" 
      align="center" 
      width="6" 
      color="#111"
      visible="false"
      ></a-text>

      <a-entity 
      id="exit-button"
      material="color:#FFC0CB" 
      geometry="depth: 0; height: 0.1; width: 0.1"
      position="1.27971 2.31821 -1.993" 
      class="clickable" 
      scale="3 3 1"
      visible="false"></a-entity>

      <a-entity
      id="btn" 
      position="-1.5 1.5 -1.5" 
      geometry="box"
      material="color: #FF0000" 
      scale="0.1 0.6 1.2"
      class="clickable"></a-entity>

      <a-text 
      id="statusText-2" 
      value="How To Play" 
      position="-1.5 2.2 -1.45105" 
      align="center" 
      width="6" 
      color="#111" 
      value: Play Game - Test;
      rotation="0 90 0"></a-text>
    </a-scene>

  </body>
</html>
