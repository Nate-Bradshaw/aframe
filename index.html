<!DOCTYPE html>
<!--
aframe-watcher index.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="script.js"></script>
    <script src="components\beat_anim.js"></script>
    <script src="components\beat_spawner.js"></script>
    <title>Vr project</title>
  </head>
  <body>
    <a-scene light="defaultLightsEnabled: false" keyboard-shortcuts="" screenshot="" xr-mode-ui="" device-orientation-permission-ui="" id="Scene">
      <a-assets>
        <audio id="song" src="music\Lord of the Rangs.mp3" preload="auto"></audio>
      </a-assets>

      <a-sky color="#ECECEC" material="color: #17132f" id="sky"></a-sky>
      <a-entity class="lights" light="color: #BBB; type: ambient" data-aframe-default-light="" aframe-injected="" id="LightAmbient"></a-entity>
      <a-entity class="lights" light="intensity: 1.884; castShadow: true" position="-0.5 1 1" data-aframe-default-light="" aframe-injected="" id="LightDirectional"></a-entity>
      <a-entity camera="active: true" position="0 1.6 0" wasd-controls="" look-controls="" id="MainCam">
        <a-entity id="cursor" raycaster="" cursor__m="" position="0 0 -0.1" geometry="primitive: circle; radius: 0.001" scale="0.5 0.5 0.5"></a-entity>
      </a-entity>
      <a-entity geometry="primitive: ring; radiusInner: 1.12; segmentsPhi: 10; segmentsTheta: 64; thetaLength: 360" material="color: #ff9494" id="StaticRing" position="0 1.5 -2"></a-entity>
      <a-entity id="BeatSpawner" position="0 0 0" beat_spawner="dur_ticks: 50; counter: #counter" sound__song="positional: false; src: #song; autoplay: false"></a-entity>

      <a-entity id="Floor" position="0 0 0" geometry="primitive: circle; radius: 2.5"  rotation="-90 0 0" material="color: #b6a3cd; flatShading: false; roughness: 0.5"></a-entity> geometry="primitive: circle; radius: 2.5"></a-entity>
      <a-entity id="Floor-2" geometry="primitive: circle; radius: 3" rotation="-90 0 0" material="color: #74549a" position="0 -0.12743 0"></a-entity>

      <a-entity id="tunnelLine" geometry="" scale="0.08 0.08 200" material="color: #00ffff"></a-entity>
      <a-entity id="tunnelLine-2" geometry="" scale="0.08 0.08 200" position="0 3 0" material="color: #990d79"></a-entity>
      <a-entity id="tunnelLine-3" geometry="" scale="0.08 0.08 200" position="1.5 1.5 0" material="color: #1bc931"></a-entity>
      <a-entity id="tunnelLine-4" geometry="" scale="0.08 0.08 200" position="-1.5 1.5 0" material="color: #b8861d"></a-entity>
      <a-entity id="tunnelLine-5" geometry="" scale="0.08 0.08 200" position="1.25 0.5 0" material="color: #20b572"></a-entity>
      <a-entity id="tunnelLine-6" geometry="" scale="0.08 0.08 200" position="-1.25 0.5 0" material="color: #a6dc27"></a-entity>
      <a-entity id="tunnelLine-7" geometry="" scale="0.08 0.08 200" position="-1.25 2.5 0" material="color: #ff040b"></a-entity>
      <a-entity id="tunnelLine-8" geometry="" scale="0.08 0.08 200" position="1.25 2.5 0" material="color: #6f22cc"></a-entity>
      

      <a-entity id="speaker1" rotation="0 30 0" position="-2.2 1.25 -2.8">
        <a-entity id="speakerBox" geometry="" position="0 0 0" rotation="0 0 0" scale="1 1.81 1" material="color: #0000d5"></a-entity>
        <a-entity id="tweeter" geometry="primitive: circle; radius: 0.2" position="0 0.51232 0.52675" rotation="0 0 0" scale="1 1 1">
          <a-entity id="tweeter-2" geometry="primitive: circle; radius: 0.17" position="0 0 0.01217" rotation="0 0 0" scale="1 1 1" material="color: #d38f9e"></a-entity>
        </a-entity>
        <a-entity id="speakerCircle" geometry="primitive: circle; radius: 0.35" position="0 -0.2621 0.53771" rotation="0 0 0" scale="1 1 1" material="color: #d28c5e">
          <a-entity id="speakerCircle-2" geometry="primitive: circle; radius: 0.31" position="0 0 0.02724" rotation="0 0 0" scale="1 1 1" material="color: #f2e377"></a-entity>
          <a-entity id="speakerCircle-3" geometry="primitive: circle; radius: 0.075" position="0 0 0.0531" rotation="0 0 0" scale="1 1 1" material="color: #c66217"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="speaker2" rotation="0 -29.999999999999996 -90" position="2.64408 0.32963 -2.82488">
        <a-entity id="speakerBox" geometry="" position="0 0 0" rotation="0 0 0" scale="1 1.81 1" material="color: #0000d5"></a-entity>
        <a-entity id="tweeter" geometry="primitive: circle; radius: 0.2" position="0 0.51232 0.52675" rotation="0 0 0" scale="1 1 1">
          <a-entity id="tweeter-2" geometry="primitive: circle; radius: 0.17" position="0 0 0.01217" rotation="0 0 0" scale="1 1 1" material="color: #d38f9e"></a-entity>
        </a-entity>
        <a-entity id="speakerCircle" geometry="primitive: circle; radius: 0.35" position="0 -0.2621 0.53771" rotation="0 0 0" scale="1 1 1" material="color: #d28c5e">
          <a-entity id="speakerCircle-2" geometry="primitive: circle; radius: 0.31" position="0 0 0.02724" rotation="0 0 0" scale="1 1 1" material="color: #f2e377"></a-entity>
          <a-entity id="speakerCircle-3" geometry="primitive: circle; radius: 0.075" position="0 0 0.0531" rotation="0 0 0" scale="1 1 1" material="color: #c66217"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="tv" position="0.16318 0.07465 -0.43384">
        <a-entity id="counter" rotation="0 -38 0" position="2.20619 1.25514 -1.9398" text__counter="align: center; value: 0" scale="10 10 10"></a-entity>
        <a-entity geometry="" position="2.41356 1.31585 -2.14857" scale="1 0.8 0.5" rotation="0 -38 0" material="alphaTest: 1; flatShading: true; color: #858585; fog: false; displacementBias: 0; displacementTextureRepeat: 0.5 1; envMap: #grasslightbignm; metalness: 1; metalnessMap: #grasslightbignm; metalnessTextureOffset: 1.29 -0.08; metalnessTextureRepeat: -0.29 1; roughness: 0.23; roughnessMap: #grasslightbignm; roughnessTextureRepeat: 0 1" id="screen"></a-entity>
        <a-entity geometry="" position="2.46301 1.74723 -2.21343" rotation="0 -38 0" scale="1.3 0.15 0.8" id="lid" material="color: #eb81d9"></a-entity>
        <a-entity geometry="" position="2.46301 0.83227 -2.21343" rotation="0 -38 0" scale="1.3 0.15 0.8" id="bottom" material="color: #eb81d9"></a-entity>
        <a-entity geometry="" position="2.92238 1.2687 -1.85782" rotation="0 -38 -90" scale="1.01 0.15 0.8" id="side" material="color: #eb81d9"></a-entity>
        <a-entity geometry="" position="2.00992 1.06629 -2.56655" rotation="0 -38 -90" scale="1.5 0.15 0.8" id="side-2" material="color: #eb81d9"></a-entity>
        <a-entity geometry="primitive: sphere" position="2.6272 1.82012 -2.04009" scale="0.2 0.14 0.14" rotation="0 -38 0" id="arial base" material="color: #a696d3"></a-entity>
        <a-entity position="2.66067 2.19819 -1.78015" geometry="" scale="0.03 0.8 0.03" rotation="32 0 0" material="color: #6e6e6e" id="arial"></a-entity>
        <a-entity position="2.66403 2.18068 -2.23552" geometry="" scale="0.03 0.8 0.03" rotation="40 180 14.999999999999998" material="color: #6e6e6e" id="arial-2"></a-entity>
      
      </a-entity>


    </a-scene>
  </body>
</html>
