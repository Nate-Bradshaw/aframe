<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="game.js"></script>

    <script src="components\beat_anim.js"></script>
    <script src="components\beat_spawner.js"></script>
    <title>Vr project</title>
</head>
<body>
    <a-scene>
        <a-assets>
            <audio id="song" src="music\Lord of the Rangs.mp3" preload="auto"></audio>
        </a-assets>
        <!-- these will be global elements -->
        <a-sky color="#ECECEC" material="color: #17132f" id="sky"></a-sky>

        <a-entity id=camera-rig>
            <a-camera id="MainCam">
                <a-entity
                    id="RingOver"
                    cursor="fuse: true; fuse-timeout = 1000"
                    raycaster="objects: .clickable"
                    position="0 0 -1"
                    
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03;"
                    material="color: green; shader: flat"
                    
                    animation__fusing="property: geometry.thetaLength; from: 360; to: 0; dur: 1500; startEvents: fusing; easing: linear"
                    animation__reset="property: geometry.thetaLength; to: 360; dur: 50; startEvents: mouseleave">

                    <!-- Outer ring -->
                    <a-entity
                    id="RingUnder" 
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: white; shader: flat"
                    position="0 0 -0.0001">  
                    </a-entity>
                </a-entity>
                <!-- this cursor is used to interact with the game, janky but works -->
                <a-entity id="cursor" raycaster="objects: .beat" cursor__m="" position="0 0 -0.1" geometry="primitive: circle; radius: 0.001" scale="0.5 0.5 0.5"></a-entity>
            </a-camera>
        </a-entity>

        <a-entity id="Floor" position="0 0 0" geometry="primitive: circle; radius: 2.5"  rotation="-90 0 0" material="color: #b6a3cd; flatShading: false; roughness: 0.5"></a-entity> geometry="primitive: circle; radius: 2.5"></a-entity>
        <a-entity id="Floor-2" geometry="primitive: circle; radius: 3" rotation="-90 0 0" material="color: #74549a" position="0 -0.12743 0"></a-entity>

        <a-light type="ambient" intensity="0.9"></a-light>

            <!-- Button to reset roration to forward facing -->
            <a-sphere id = "reset-btn"
                position="0 -0.75 0" 
                radius="1" 
                color="#EF2D5E"
                class="clickable"

                animation__mouseenter="property: material.color; to: #F5819E; dur: 100; startEvents: mouseenter"
                animation__mouseleave="property: material.color; to: #EF2D5E; dur: 100; startEvents: mouseleave">
            </a-sphere>

            <a-entity id="forward_arrow"
                geometry="primitive: plane" material="color: #ff0000" rotation="-90 0 0" position="0 0.00471 -0.49146" scale="0.06 1 1">
            </a-entity>
            <!-- end Button to reset roration to forward facing -->

            <a-text id="playGameText"

                position="1.5 1.52275 -3"

            </a-text>
            
            <a-text id="menuText"

                visible="false"

                width="6"

                position="0 1.5 -2"

            <!-- How To Play Menu -->
            <a-text id="gamePara1" 
                position="-1.44642 2.23938 -1.99643" 
                align="center" 
                color="#111" 
                scale="0.4 0.5 1" 
                text="align: left; 
                value: KAVRRG is a rhythm game that is catered to be as accessible as possible. The game is played by glacing at musical notes as they approach a ring in time with the beats of the song.; width: 4.8"
                visible="false">
            </a-text>

            <a-image id="menuImage1"  
                position="0.97118 2.1392 -1.989" 
                material="src: images/baseGame.png" 
                geometry="height: 0.62; width: 0.8"
                visible="false">
            </a-image>

            <a-text id="gamePara2" 
                position="-0.48942 1.52962 -1.99643" 
                align="center" 
                color="#111" 
                scale="0.4 0.5 1" 
                text="align: left;
