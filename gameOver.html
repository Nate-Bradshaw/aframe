<!DOCTYPE html>
<!--
aframe-watcher index.html
-->
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- <link rel="stylesheet" href="./style.css">  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="gameOverMenu.js"></script>
    <title>Vr project</title>
  </head>
  <body>
    <a-scene>
      <a-sky color="#ECECEC" material="color: #000000" id="sky"></a-sky>
      <!-- Camera and cursor (gaze/click) -->
      <a-camera id="MainCam">
        <a-entity
          id="RingOver"
          cursor="fuse: true; fuse-timeout = 1000"
          raycaster="objects: .clickable"
          position="0 0 -1"
          
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03;"
          material="color: green; shader: flat"
            
          animation__fusing="property: geometry.thetaLength; from: 360; to: 0; dur: 1500; startEvents: fusing; easing: linear"
          animation__reset="property: geometry.thetaLength; to: 360; dur: 50; startEvents: mouseleave">

          <!-- Outer ring -->
          <a-entity
            id="RingUnder" 
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: white; shader: flat"
            position="0 0 -0.0001">  
          </a-entity>

        </a-entity>
      </a-camera>

      <!-- Ground + light so you can see -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#DDD"></a-plane>
      <a-light type="ambient" intensity="0.9"></a-light>

      <!-- Buttons -->
      <a-entity 
      id="exit-button"
      material="color:#FFC0CB" 
      geometry="depth: 0; height: 0.350; width: 1"
      position="0.8806 0.802 -1.993" 
      class="clickable" 
      animation__mouseenter="property: material.color; to: #89B4F9; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #FFC0CB; dur: 100; startEvents: mouseleave">
      ></a-entity>

      <a-entity id="restart-button"
      material="color: #32a852" 
      geometry="depth: 0; height: 0.35" 
      position="-0.83633 0.802 -1.993" 
      class="clickable" 
      animation__mouseenter="dur: 100; property: material.color; startEvents: mouseenter; to: #89B4F9" 
      animation__mouseleave="dur: 100; property: material.color; startEvents: mouseleave; to: #32a852">
      &gt;</a-entity>

      <!-- Menu Contents -->
      <a-box
      id="example-menu"
      position="0 1.5 -2"
      height="2"
      width="3"
      depth="0"
      color="#808080"
      ></a-box>
      <a-text id="gameInstructions"
      value="Game Over"
      position="-0.003 1.717 -1.996"
      color="#111" 
      scale="0.4 0.5 1" 
      text="align: center; 
      width: 17.870">
      </a-text>

      <!-- Button to reset roration to forward facing -->
      <a-sphere 
      id = "reset-btn"
      position="0 -0.75 0" 
      radius="1" 
      color="#EF2D5E"
      class="clickable"

      animation__mouseenter="property: material.color; to: #F5819E; dur: 100; startEvents: mouseenter"
      animation__mouseleave="property: material.color; to: #EF2D5E; dur: 100; startEvents: mouseleave">
    </a-sphere>
    </a-scene>
  </body>
</html>
